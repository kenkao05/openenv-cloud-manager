version: "1.0.0"
name: "CloudResourceManager-v1"
entry_point: "env:app"
environment_variables:
  - API_BASE_URL
  - MODEL_NAME
  - HF_TOKEN
endpoints:
  reset: "/reset"
  step: "/step"
  state: "/state"
tasks:
  - id: "scale-up-basic"
    difficulty: "easy"
    grader: "tasks:grade_scale_up_basic"
  - id: "latency-control"
    difficulty: "medium"
    grader: "tasks:grade_latency_control"
  - id: "cost-optimization-heavy"
    difficulty: "hard"
    grader: "tasks:grade_cost_optimization"
